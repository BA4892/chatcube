<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #333333;
    }

    body {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
      overflow: auto;
      background: #ffffff;
      color: #333333;
      font-family: HarmonyOS Sans, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #diagram {
      width: 100%;
      min-height: calc(100vh - 24px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    #diagram svg {
      max-width: 100%;
      height: auto;
      display: block;
    }

    #diagram.scrollable {
      align-items: flex-start;
      justify-content: flex-start;
    }

    #diagram.scrollable svg {
      max-width: none;
    }

    #error {
      display: none;
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: #fff4f4;
      color: #a12626;
      font: 12px/18px monospace;
    }

    html.dark,
    body.dark {
      background: #1a1a1a;
      color: #e0e0e0;
    }

    body.dark #error {
      background: #2f2020;
      color: #ffb7b7;
    }
  </style>
  <script src="./mermaid.min.js"></script>
</head>
<body>
  <div id="diagram"></div>
  <pre id="error"></pre>
  <script>
    (function () {
      var renderToken = 0;

      function setTheme(payload) {
        var dark = !!payload.dark;
        var background = payload.background || (dark ? '#1a1a1a' : '#ffffff');
        var text = payload.text || (dark ? '#e0e0e0' : '#333333');
        document.documentElement.classList.toggle('dark', dark);
        document.body.classList.toggle('dark', dark);
        document.documentElement.style.background = background;
        document.documentElement.style.color = text;
        document.body.style.background = background;
        document.body.style.color = text;
      }

      function getSvgIntrinsicSize(svg) {
        var viewBox = svg.viewBox && svg.viewBox.baseVal;
        if (viewBox && viewBox.width > 0 && viewBox.height > 0) {
          return {
            width: viewBox.width,
            height: viewBox.height
          };
        }

        var width = parseFloat(svg.getAttribute('width') || '0');
        var height = parseFloat(svg.getAttribute('height') || '0');
        if (isFinite(width) && isFinite(height) && width > 0 && height > 0) {
          return {
            width: width,
            height: height
          };
        }

        try {
          var box = svg.getBBox();
          if (box && box.width > 0 && box.height > 0) {
            return {
              width: box.width,
              height: box.height
            };
          }
        } catch (err) {
        }

        return {
          width: 0,
          height: 0
        };
      }

      function updateDiagramLayout() {
        var diagram = document.getElementById('diagram');
        var svg = diagram ? diagram.querySelector('svg') : null;
        if (!diagram || !svg) {
          return;
        }
        svg.style.maxWidth = '100%';
        svg.style.width = '';
        svg.style.height = 'auto';
        diagram.classList.remove('scrollable');
        requestAnimationFrame(function () {
          var size = getSvgIntrinsicSize(svg);
          var needsScroll = size.width > diagram.clientWidth || size.height > diagram.clientHeight;
          if (needsScroll && size.width > 0 && size.height > 0) {
            svg.style.width = size.width + 'px';
            svg.style.height = size.height + 'px';
            svg.style.maxWidth = 'none';
          }
          diagram.classList.toggle('scrollable', needsScroll);
        });
      }

      function showError(message) {
        var diagram = document.getElementById('diagram');
        var error = document.getElementById('error');
        diagram.innerHTML = '';
        diagram.style.display = 'none';
        diagram.classList.remove('scrollable');
        error.style.display = 'block';
        error.textContent = message || 'Mermaid render failed.';
      }

      function getThemeVariables(payload) {
        var dark = !!payload.dark;
        return {
          primaryColor: payload.primaryLight || (dark ? '#273646' : '#D8E2EE'),
          primaryTextColor: payload.text || (dark ? '#e0e0e0' : '#333333'),
          primaryBorderColor: payload.primary || (dark ? '#9CBFE8' : '#4E6F9E'),
          lineColor: payload.line || (dark ? '#9a9a9a' : '#666666'),
          secondaryColor: dark ? '#242424' : '#f6f8fa',
          tertiaryColor: payload.background || (dark ? '#1a1a1a' : '#ffffff'),
          fontFamily: 'HarmonyOS Sans, -apple-system, BlinkMacSystemFont, sans-serif'
        };
      }

      window.renderMermaid = function (payload) {
        payload = payload || {};
        var currentToken = ++renderToken;
        var diagram = document.getElementById('diagram');
        var error = document.getElementById('error');
        var code = String(payload.code || '').trim();

        setTheme(payload);
        diagram.innerHTML = '';
        diagram.style.display = 'flex';
        diagram.classList.remove('scrollable');
        error.style.display = 'none';
        error.textContent = '';

        if (!code) {
          showError('Empty Mermaid diagram.');
          return;
        }
        if (!window.mermaid) {
          showError('Mermaid library is not loaded.');
          return;
        }

        try {
          window.mermaid.initialize({
            startOnLoad: false,
            securityLevel: 'strict',
            theme: payload.dark ? 'dark' : 'default',
            themeVariables: getThemeVariables(payload)
          });

          var renderId = 'chatcube_mermaid_' + Date.now() + '_' + Math.floor(Math.random() * 1000000);
          Promise.resolve(window.mermaid.render(renderId, code))
            .then(function (result) {
              if (currentToken !== renderToken) {
                return;
              }
              diagram.innerHTML = result.svg;
              var svg = diagram.querySelector('svg');
              if (svg) {
                updateDiagramLayout();
              }
              if (typeof result.bindFunctions === 'function') {
                result.bindFunctions(diagram);
              }
            })
            .catch(function (err) {
              if (currentToken !== renderToken) {
                return;
              }
              showError(err && err.message ? err.message : String(err));
            });
        } catch (err) {
          showError(err && err.message ? err.message : String(err));
        }
      };

      window.addEventListener('resize', updateDiagramLayout);
    })();
  </script>
</body>
</html>
